<h2 mat-dialog-title>{{ data ? 'სიახლის რედაქტირება' : 'ახალი სიახლე' }}</h2>
<form [formGroup]="form" (ngSubmit)="submit()" class="news-form">
  <mat-dialog-content class="news-dialog-content">
    <mat-form-field appearance="outline" class="news-field">
      <mat-label>სათაური</mat-label>
      <input matInput formControlName="title" placeholder="სიახლის სათაური" />
    </mat-form-field>
    @if (editor) {
      <div class="news-field">
        <label class="news-editor-label">აღწერა</label>
        <div class="news-editor-wrapper NgxEditor__Wrapper">
          <ngx-editor-menu [editor]="editor"></ngx-editor-menu>
          <ngx-editor
            [editor]="editor"
            formControlName="description"
            [placeholder]="'დაწერეთ სიახლის ტექსტი...'"
            [outputFormat]="'html'"
          ></ngx-editor>
        </div>
      </div>
    }

    <div style="display: flex; align-items: center; gap: 12px; flex-wrap: wrap;">
      <div style="width: 160px; height: 96px; border-radius: 12px; overflow: hidden; border: 1px solid rgba(0,0,0,0.12); background: #fff; display: grid; place-items: center;">
        @if (previewUrl()) {
          <img [src]="previewUrl()!" alt="News photo preview" style="width: 100%; height: 100%; object-fit: cover; display: block;" />
        } @else {
          <span style="font-size: 12px; color: #64748b;">No photo</span>
        }
      </div>

      <div style="display: flex; flex-direction: column; gap: 6px;">
        <button mat-stroked-button type="button" (click)="fileInput.click()" [disabled]="uploading()">
          აირჩიე ფოტო
        </button>
        <span style="font-size: 12px; color: #64748b;">JPG/PNG • max 2MB</span>
        @if (uploading()) {
          <span style="font-size: 12px; color: #64748b;">
            Progress: {{ uploadProgress() ?? 0 }}%
          </span>
        }
      </div>
    </div>

    <input #fileInput type="file" accept="image/jpeg,image/png" hidden (change)="onFileSelected($event)" />

    @if (uploadError()) {
      <div style="color: #b91c1c; font-size: 0.875rem;">{{ uploadError() }}</div>
    }

    <mat-form-field appearance="outline" class="news-field">
      <mat-label>ფოტოს URL (optional)</mat-label>
      <input matInput formControlName="photoUrl" placeholder="https://..." />
    </mat-form-field>
  </mat-dialog-content>
  <mat-dialog-actions align="end">
    <button mat-button type="button" mat-dialog-close>გაუქმება</button>
    <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid || uploading()">
      @if (uploading()) { იტვირთება... } @else { შენახვა }
    </button>
  </mat-dialog-actions>
</form>
