<mat-card>
  <mat-card-header>
    <mat-card-title>თამაშები</mat-card-title>
    <button mat-flat-button color="primary" (click)="openCreateDialog()">
      <mat-icon>add</mat-icon>
      თამაშის დამატება
    </button>
  </mat-card-header>
  <mat-card-content>
    <table mat-table [dataSource]="dataSource" class="full-width">
      <ng-container matColumnDef="date">
        <th mat-header-cell *matHeaderCellDef>თარიღი / დრო</th>
        <td mat-cell *matCellDef="let row">{{ row.date }} {{ row.time }}</td>
      </ng-container>
      <ng-container matColumnDef="match">
        <th mat-header-cell *matHeaderCellDef>თამაში</th>
        <td mat-cell *matCellDef="let row">
          <a [routerLink]="['/matches', row._id]">{{ row.homeTeamName ?? row.homeTeamId }} vs {{ row.awayTeamName ?? row.awayTeamId }}</a>
        </td>
      </ng-container>
      <ng-container matColumnDef="location">
        <th mat-header-cell *matHeaderCellDef>მდებარეობა</th>
        <td mat-cell *matCellDef="let row">{{ row.location }}</td>
      </ng-container>
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>სტატუსი</th>
        <td mat-cell *matCellDef="let row">{{ row.status }}</td>
      </ng-container>
      <ng-container matColumnDef="score">
        <th mat-header-cell *matHeaderCellDef>ქულები</th>
        <td mat-cell *matCellDef="let row">{{ row.scoreHome ?? '-' }} : {{ row.scoreAway ?? '-' }}</td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let row">
          <button mat-icon-button [routerLink]="['/matches', row._id]"><mat-icon>edit</mat-icon></button>
          <button mat-icon-button color="warn" (click)="confirmDelete(row)"><mat-icon>delete</mat-icon></button>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </mat-card-content>
</mat-card>
