<h2 mat-dialog-title>{{ data ? 'სეზონის რედაქტირება' : 'ახალი სეზონი' }}</h2>
<form [formGroup]="form" (ngSubmit)="submit()">
  <mat-dialog-content>
    <mat-form-field appearance="outline">
      <mat-label>სახელი</mat-label>
      <input matInput formControlName="name" placeholder="მაგ. 2024/25" />
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>ასაკის კატეგორია</mat-label>
      <mat-select formControlName="ageCategory">
        @for (cat of (categories$ | async) ?? []; track cat._id) {
          <mat-option [value]="cat._id">{{ cat.name }}</mat-option>
        }
      </mat-select>
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>დაწყების თარიღი</mat-label>
      <input matInput [matDatepicker]="startPicker" formControlName="startDate" />
      <mat-datepicker-toggle matIconSuffix [for]="startPicker"></mat-datepicker-toggle>
      <mat-datepicker #startPicker></mat-datepicker>
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>დასრულების თარიღი</mat-label>
      <input matInput [matDatepicker]="endPicker" formControlName="endDate" />
      <mat-datepicker-toggle matIconSuffix [for]="endPicker"></mat-datepicker-toggle>
      <mat-datepicker #endPicker></mat-datepicker>
    </mat-form-field>
    <mat-slide-toggle formControlName="isActive">აქტიური სეზონი</mat-slide-toggle>
  </mat-dialog-content>
  <mat-dialog-actions align="end">
    <button mat-button type="button" mat-dialog-close>გაუქმება</button>
    <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid">შენახვა</button>
  </mat-dialog-actions>
</form>
