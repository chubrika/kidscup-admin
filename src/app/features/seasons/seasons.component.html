<mat-card>
  <mat-card-header>
    <mat-card-title>სეზონები</mat-card-title>
    <button mat-flat-button color="primary" (click)="openCreateDialog()">
      <mat-icon>add</mat-icon>
      სეზონის დამატება
    </button>
  </mat-card-header>
  <mat-card-content>
    <table mat-table [dataSource]="dataSource" class="full-width">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>სახელი</th>
        <td mat-cell *matCellDef="let row">{{ row.name }}</td>
      </ng-container>
      <ng-container matColumnDef="ageCategory">
        <th mat-header-cell *matHeaderCellDef>ასაკის კატეგორია</th>
        <td mat-cell *matCellDef="let row">{{ getCategoryName(row) }}</td>
      </ng-container>
      <ng-container matColumnDef="startDate">
        <th mat-header-cell *matHeaderCellDef>დაწყების თარიღი</th>
        <td mat-cell *matCellDef="let row">{{ formatDate(row.startDate) }}</td>
      </ng-container>
      <ng-container matColumnDef="endDate">
        <th mat-header-cell *matHeaderCellDef>დასრულების თარიღი</th>
        <td mat-cell *matCellDef="let row">{{ formatDate(row.endDate) }}</td>
      </ng-container>
      <ng-container matColumnDef="active">
        <th mat-header-cell *matHeaderCellDef>აქტიური</th>
        <td mat-cell *matCellDef="let row">{{ row.isActive ? 'კი' : 'არა' }}</td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let row">
          <button mat-icon-button (click)="openEditDialog(row)"><mat-icon>edit</mat-icon></button>
          <button mat-icon-button color="warn" (click)="confirmDelete(row)"><mat-icon>delete</mat-icon></button>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </mat-card-content>
</mat-card>
