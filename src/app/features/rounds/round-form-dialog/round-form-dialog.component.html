<h2 mat-dialog-title>{{ isRound(data) ? 'ტურის რედაქტირება' : 'ახალი ტური' }}</h2>
<form [formGroup]="form" (ngSubmit)="submit()">
  <mat-dialog-content>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>ჯგუფი</mat-label>
      <mat-select formControlName="group">
        @for (g of groups; track g._id) {
          <mat-option [value]="g._id">{{ g.name }}</mat-option>
        }
      </mat-select>
    </mat-form-field>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>ტურის სახელი</mat-label>
      <input matInput formControlName="name" placeholder="მაგ: 1 ტური" />
    </mat-form-field>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>ტურის ნომერი</mat-label>
      <input matInput type="number" formControlName="roundNumber" min="1" />
    </mat-form-field>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>თარიღი (არასავალდებულო)</mat-label>
      <input matInput [matDatepicker]="picker" formControlName="date" />
      <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
      <mat-datepicker #picker></mat-datepicker>
    </mat-form-field>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>რიგი</mat-label>
      <input matInput type="number" formControlName="sortOrder" min="0" />
    </mat-form-field>
  </mat-dialog-content>
  <mat-dialog-actions align="end">
    <button mat-button type="button" mat-dialog-close>გაუქმება</button>
    <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid">შენახვა</button>
  </mat-dialog-actions>
</form>
