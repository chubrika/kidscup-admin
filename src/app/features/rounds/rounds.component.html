<mat-card>
  <mat-card-header>
    <mat-card-title>ტურები</mat-card-title>
    <div class="filters">
      <mat-form-field appearance="outline" subscriptSizing="dynamic">
        <mat-label>ჯგუფი</mat-label>
        <mat-select [value]="selectedGroupId" (selectionChange)="onGroupChange($event.value)">
          @for (g of groups; track g._id) {
            <mat-option [value]="g._id">{{ g.name }}</mat-option>
          }
        </mat-select>
      </mat-form-field>
      <button mat-flat-button color="primary" (click)="openCreateDialog()" [disabled]="!selectedGroupId">
        <mat-icon>add</mat-icon>
        ახალი ტური
      </button>
    </div>
  </mat-card-header>
  <mat-card-content>
    <table mat-table [dataSource]="dataSource" class="full-width">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>სახელი</th>
        <td mat-cell *matCellDef="let row">{{ row.name }}</td>
      </ng-container>
      <ng-container matColumnDef="roundNumber">
        <th mat-header-cell *matHeaderCellDef>№</th>
        <td mat-cell *matCellDef="let row">{{ row.roundNumber }}</td>
      </ng-container>
      <ng-container matColumnDef="group">
        <th mat-header-cell *matHeaderCellDef>ჯგუფი</th>
        <td mat-cell *matCellDef="let row">{{ groupName(row) }}</td>
      </ng-container>
      <ng-container matColumnDef="date">
        <th mat-header-cell *matHeaderCellDef>თარიღი</th>
        <td mat-cell *matCellDef="let row">{{ row.date ? (row.date | date:'dd.MM.yyyy') : '—' }}</td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let row">
          <button mat-icon-button (click)="openEditDialog(row)"><mat-icon>edit</mat-icon></button>
          <button mat-icon-button color="warn" (click)="confirmDelete(row)"><mat-icon>delete</mat-icon></button>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </mat-card-content>
</mat-card>
