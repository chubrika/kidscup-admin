<mat-card>
  <mat-card-content>
    <table mat-table [dataSource]="matches()" class="full-width">
      <ng-container matColumnDef="date">
        <th mat-header-cell *matHeaderCellDef>Date</th>
        <td mat-cell *matCellDef="let row">{{ row.date }} {{ row.time }}</td>
      </ng-container>
      <ng-container matColumnDef="match">
        <th mat-header-cell *matHeaderCellDef>Match</th>
        <td mat-cell *matCellDef="let row">
          <a [routerLink]="['/matches', row.id]">
            {{ row.homeTeamName }} vs {{ row.awayTeamName }}
          </a>
        </td>
      </ng-container>
      <ng-container matColumnDef="score">
        <th mat-header-cell *matHeaderCellDef>Score</th>
        <td mat-cell *matCellDef="let row">{{ row.scoreHome ?? '-' }} : {{ row.scoreAway ?? '-' }}</td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </mat-card-content>
</mat-card>
