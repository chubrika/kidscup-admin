<mat-card>
  <mat-card-content>
    <dl class="info-list">
      <dt>დასახელება</dt><dd>{{ team().name }}</dd>
      <dt>ქალაქი</dt><dd>{{ team().city }}</dd>
      <dt>მწვრთნელი</dt><dd>{{ team().coachName }}</dd>
      <dt>ჩემპიონატი</dt><dd>{{ team().ageCategory.name ?? '-' }}</dd>
      @if (team().logo) {
        <dt>ლოგო</dt>
        <dd><img [src]="team().logo" alt="Logo" class="logo" /></dd>
      }
    </dl>
  </mat-card-content>
</mat-card>
