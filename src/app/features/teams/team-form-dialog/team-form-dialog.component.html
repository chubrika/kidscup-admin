<h2 mat-dialog-title>{{ data ? 'Edit Team' : 'New Team' }}</h2>
<form [formGroup]="form" (ngSubmit)="submit()">
  <mat-dialog-content>
    <mat-form-field appearance="outline">
      <mat-label>Name</mat-label>
      <input matInput formControlName="name" />
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>City</mat-label>
      <input matInput formControlName="city" />
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Coach Name</mat-label>
      <input matInput formControlName="coachName" />
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Age Category</mat-label>
      <mat-select formControlName="ageCategory">
        @for (cat of categories; track cat.id) {
          <mat-option [value]="cat.id">{{ cat.name }}</mat-option>
        }
      </mat-select>
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Logo URL</mat-label>
      <input matInput formControlName="logo" placeholder="https://..." />
    </mat-form-field>
  </mat-dialog-content>
  <mat-dialog-actions align="end">
    <button mat-button type="button" mat-dialog-close>Cancel</button>
    <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid">Save</button>
  </mat-dialog-actions>
</form>
