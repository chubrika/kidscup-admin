<h2 mat-dialog-title>{{ data ? 'გუნდის რედაქტირება' : 'ახალი გუნდი' }}</h2>
<form [formGroup]="form" (ngSubmit)="submit()">
  <mat-dialog-content>
    <mat-form-field appearance="outline">
      <mat-label>დასახელება</mat-label>
      <input matInput formControlName="name" />
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>ქალაქი</mat-label>
      <input matInput formControlName="city" />
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>მწვრთნელის სახელი</mat-label>
      <input matInput formControlName="coachName" />
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>ჩემპიონატი</mat-label>
      <mat-select formControlName="ageCategory">
        @for (cat of categories; track cat._id) {
          <mat-option [value]="cat._id">{{ cat.name }}</mat-option>
        }
      </mat-select>
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Logo URL</mat-label>
      <input matInput formControlName="logo" placeholder="https://..." />
    </mat-form-field>
  </mat-dialog-content>
  <mat-dialog-actions align="end">
    <button mat-button type="button" mat-dialog-close>გაუქმება</button>
    <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid">შენახვა</button>
  </mat-dialog-actions>
</form>
