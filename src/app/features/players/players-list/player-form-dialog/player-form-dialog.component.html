<h2 mat-dialog-title>{{ data ? 'Edit Player' : 'New Player' }}</h2>
<form [formGroup]="form" (ngSubmit)="submit()">
  <mat-dialog-content>
    <mat-form-field appearance="outline">
      <mat-label>First Name</mat-label>
      <input matInput formControlName="firstName" />
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Last Name</mat-label>
      <input matInput formControlName="lastName" />
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Number</mat-label>
      <input matInput type="number" formControlName="number" />
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Position</mat-label>
      <input matInput formControlName="position" placeholder="e.g. Guard, Forward" />
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Birth Date</mat-label>
      <input matInput type="date" formControlName="birthDate" />
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Height (cm)</mat-label>
      <input matInput type="number" formControlName="height" />
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Team</mat-label>
      <mat-select formControlName="teamId">
        @for (t of teams(); track t._id) {
          <mat-option [value]="t._id">{{ t.name }}</mat-option>
        }
      </mat-select>
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Photo URL</mat-label>
      <input matInput formControlName="photo" placeholder="https://..." />
    </mat-form-field>
  </mat-dialog-content>
  <mat-dialog-actions align="end">
    <button mat-button type="button" mat-dialog-close>Cancel</button>
    <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid">Save</button>
  </mat-dialog-actions>
</form>
