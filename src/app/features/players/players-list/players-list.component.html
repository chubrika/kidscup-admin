<mat-card>
  <mat-card-header>
    <mat-card-title>მოთამაშეები</mat-card-title>
    <span class="header-spacer"></span>
    <div class="header-actions">
      <mat-form-field appearance="outline" class="team-filter" subscriptSizing="dynamic">
        <mat-label>გუნდი</mat-label>
        <mat-select [value]="selectedTeamId" (selectionChange)="onTeamFilterChange($event.value)">
          <mat-option value="">ყველა გუნდი</mat-option>
          @for (team of teams; track team._id) {
            <mat-option [value]="team._id">{{ team.name }}</mat-option>
          }
        </mat-select>
      </mat-form-field>
      <button mat-flat-button color="primary" (click)="openCreateDialog()">
        <mat-icon>add</mat-icon>
        მოთამაშის დამატება
      </button>
    </div>
  </mat-card-header>
  <mat-card-content>
    <table mat-table [dataSource]="dataSource" class="full-width">
      <ng-container matColumnDef="number">
        <th mat-header-cell *matHeaderCellDef>#</th>
        <td mat-cell *matCellDef="let row">{{ row.number }}</td>
      </ng-container>
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>სახელი</th>
        <td mat-cell *matCellDef="let row">
          <a [routerLink]="['/players', row._id]">{{ row.firstName }} {{ row.lastName }}</a>
        </td>
      </ng-container>
      <ng-container matColumnDef="position">
        <th mat-header-cell *matHeaderCellDef>პოზიცია</th>
        <td mat-cell *matCellDef="let row">{{ row.position }}</td>
      </ng-container>
      <ng-container matColumnDef="teamName">
        <th mat-header-cell *matHeaderCellDef>გუნდი</th>
        <td mat-cell *matCellDef="let row">
          <a [routerLink]="['/teams', row.teamId?._id]">{{ row.teamId?.name ?? '-' }}</a>
        </td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let row">
          <button mat-icon-button [routerLink]="['/players', row._id]"><mat-icon>edit</mat-icon></button>
          <button mat-icon-button color="warn" (click)="confirmDelete(row)"><mat-icon>delete</mat-icon></button>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </mat-card-content>
</mat-card>
